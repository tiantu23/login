<section class="publish-section">
    <div class="container">
        <div class="row">
            <div class="col-md-8 col-md-offset-2">
                <div class="publish-form panel panel-default">
                    <div class="panel-body">
                        <h3>三、核心功能（超详细）</h3>
                        <h4>1. 发布闲置（用户端）</h4>
                        <p>用户点击“发布闲置”，填写以下信息：</p>
                        <form id="publishIdleForm">
                            <div class="form-group">
                                <label for="itemName">1. 物品名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="itemName" placeholder="请输入物品名称" required>
                            </div>
                            <div class="form-group">
                                <label for="itemCategory">2. 物品分类（下拉选择） <span class="text-danger">*</span></label>
                                <select class="form-control" id="itemCategory" required>
                                    <option value="">请选择物品分类</option>
                                    <option value="electronics">电子产品</option>
                                    <option value="clothing">服饰箱包</option>
                                    <option value="books">书籍文具</option>
                                    <option value="furniture">家居用品</option>
                                    <option value="others">其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="itemDesc">3. 物品描述（新旧程度、使用情况） <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="itemDesc" rows="4" placeholder="请描述物品新旧程度、使用情况等" required></textarea>
                            </div>
                            <div class="form-group">
                                <label for="itemImages">4. 物品照片（最多3-6张）</label>
                                <input type="file" id="itemImages" accept="image/*" multiple>
                                <div class="image-preview" id="imagePreview"></div>
                            </div>
                            <div class="form-group">
                                <label>5. 期望交换方式：</label>
                                <div class="radio-group">
                                    <label>
                                        <input type="radio" name="exchangeType" value="exchange" required> 交换（我用A换你的B）
                                    </label>
                                    <label>
                                        <input type="radio" name="exchangeType" value="free"> 免费赠送
                                    </label>
                                    <label>
                                        <input type="radio" name="exchangeType" value="lowPrice"> 低价自提（可选）
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>6. 交易方式：</label>
                                <div class="radio-group">
                                    <label>
                                        <input type="radio" name="tradeType" value="selfPickup" required> 同城自提
                                    </label>
                                    <label>
                                        <input type="radio" name="tradeType" value="mail"> 线上邮寄（运费自理）
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="location">7. 所在城市 / 校区 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="location" placeholder="请输入所在城市或校区" required>
                            </div>
                            <button type="submit" class="btn btn-submit">
                                <i class="fa fa-paper-plane"></i> 提交 → 进入审核
                            </button>
                        </form>
                    </div>

<script>
    // 图片预览功能
    document.getElementById('itemImages').addEventListener('change', function(e) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        const files = e.target.files;
        if (files.length > 6) {
            alert('最多只能上传6张图片');
            this.value = '';
            return;
        }
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.style.width = '100px';
                img.style.height = '100px';
                img.style.objectFit = 'cover';
                img.style.margin = '5px';
                preview.appendChild(img);
            }
            reader.readAsDataURL(file);
        }
    });

    // 表单提交处理
    document.getElementById('publishIdleForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('您的闲置信息已提交，正在审核中，请耐心等待！');
        // 这里可以添加实际的表单提交逻辑，比如使用axios发送数据到后端
    });
</script>
